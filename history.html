<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Complaint History</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:15px;
margin-top:15px;
}

.status{
display:inline-block;
padding:10px 18px;
border-radius:12px;
margin-top:15px;

background:linear-gradient(
45deg,
#3b82f6,
#9333ea
);

font-weight:bold;
}

.feedbackBox{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:15px;
}

textarea{
width:100%;
height:90px;
border:none;
outline:none;
padding:15px;
border-radius:15px;
background:#334155;
color:white;
resize:none;
margin-top:10px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:15px;

background:linear-gradient(
45deg,
#3b82f6,
#9333ea
);

color:white;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.feedbackText{
margin-top:15px;
color:#cbd5e1;
}

</style>

</head>

<body>

<h1>
Complaint History 📂
</h1>

<div
class="grid"
id="historyBox">

Loading...

</div>

<script>

const API =
"https://smart-civic-backend-2.onrender.com";

async function loadComplaints(){

try{

const response =
await fetch(
`${API}/get-complaints`
);

const complaints =
await response.json();

let html = "";

complaints.reverse().forEach(item => {

html += `

<div class="card">

<h2>${item.title}</h2>

<br>

<p>
<b>Name:</b>
${item.name}
</p>

<br>

<p>
<b>Area:</b>
${item.area}
</p>

<br>

<p>
<b>Category:</b>
${item.category}
</p>

<br>

<p>
<b>AI:</b>
${item.ai_category}
</p>

<br>

<p>
${item.description}
</p>

<div class="status">

${item.status}

</div>

${
item.image
?
`<img src="${API}/uploads/${item.image}">`
:
""
}

<div class="feedbackBox">

<h3>
Give Feedback ⭐
</h3>

<textarea
id="feedback-${item.id}"
placeholder="Write feedback here..."></textarea>

<button
onclick="submitFeedback(${item.id})">

Submit Feedback

</button>

<div class="feedbackText">

<b>Feedback:</b>

${
item.feedback
?
item.feedback
:
"No Feedback Yet"
}

</div>

</div>

</div>

`;

});

document.getElementById(
"historyBox"
).innerHTML = html;

}

catch(error){

console.log(error);

document.getElementById(
"historyBox"
).innerHTML =
"Server Error";

}

}

async function submitFeedback(id){

const feedback =
document.getElementById(
`feedback-${id}`
).value;

if(feedback==""){

alert(
"Please Write Feedback"
);

return;

}

try{

const response = await fetch(

`${API}/submit-feedback/${id}`,

{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({

feedback:feedback

})

}

);

const data =
await response.json();

alert(data.message);

loadComplaints();

}

catch(error){

console.log(error);

alert(
"Feedback Failed"
);

}

}

loadComplaints();

</script>

</body>
</html>
