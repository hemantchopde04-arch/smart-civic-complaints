<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  min-height:100vh;

  padding:30px;

  background:
  radial-gradient(circle at top left,#2563eb,#020617 40%),
  radial-gradient(circle at bottom right,#9333ea,#020617 40%);

  color:white;
}

.top{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:25px;
}

.top a{

  color:#60a5fa;

  text-decoration:none;
}

.search{

  width:100%;

  padding:15px;

  border:none;

  border-radius:15px;

  margin-bottom:25px;

  background:rgba(255,255,255,0.08);

  color:white;

  outline:none;
}

table{

  width:100%;

  border-collapse:collapse;

  background:rgba(255,255,255,0.05);

  border-radius:20px;

  overflow:hidden;
}

th,
td{

  padding:15px;

  text-align:center;
}

th{

  background:rgba(255,255,255,0.08);
}

tr{

  border-bottom:1px solid rgba(255,255,255,0.08);
}

img{

  width:80px;

  height:80px;

  object-fit:cover;

  border-radius:10px;
}

select{

  padding:8px;

  border:none;

  border-radius:10px;

  background:#1e293b;

  color:white;
}

.feedback{

  color:#cbd5e1;

  font-size:14px;
}

</style>
</head>

<body>

<div class="top">

<h1>Admin Complaint Panel 📋</h1>

<a href="dashboard.html">

← Back Dashboard

</a>

</div>

<input type="text"
class="search"
placeholder="Search Complaint..."
onkeyup="searchComplaint(this.value)">

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Title</th>
<th>Area</th>
<th>Category</th>
<th>Image</th>
<th>Status</th>
<th>Feedback</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

<script>

const API =
"https://smart-civic-backend-2.onrender.com";

let complaints = [];

async function loadComplaints(){

try{

const response = await fetch(
`${API}/get-complaints`
);

complaints = await response.json();

showComplaints(complaints);

}

catch(error){

console.log(error);

alert("Server Error");

}

}

function showComplaints(data){

let html = "";

data.reverse().forEach(item => {

html += `

<tr>

<td>${item.id}</td>

<td>${item.name}</td>

<td>${item.title}</td>

<td>${item.area}</td>

<td>${item.category}</td>

<td>

${
item.image
?
`<img src="${API}/uploads/${item.image}">`
:
"No Image"
}

</td>

<td>

<select onchange="updateStatus(${item.id},this.value)">

<option
value="Pending"
${item.status=="Pending"?"selected":""}>
Pending
</option>

<option
value="In Progress"
${item.status=="In Progress"?"selected":""}>
In Progress
</option>

<option
value="Resolved"
${item.status=="Resolved"?"selected":""}>
Resolved
</option>

</select>

</td>

<td class="feedback">

${
item.feedback
?
item.feedback
:
"No Feedback"
}

</td>

</tr>

`;

});

document.getElementById(
"tableBody"
).innerHTML = html;

}

async function updateStatus(id,status){

try{

const response = await fetch(
`${API}/update-status/${id}`,
{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
status:status
})
}
);

const data = await response.json();

alert(data.message);

loadComplaints();

}

catch(error){

console.log(error);

alert("Status Update Failed");

}

}

function searchComplaint(text){

const filtered =
complaints.filter(item =>

item.title
.toLowerCase()
.includes(text.toLowerCase())

);

showComplaints(filtered);

}

loadComplaints();

</script>

</body>
</html>
