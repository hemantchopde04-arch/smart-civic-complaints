<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Analytics Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

padding:30px;

background:
radial-gradient(circle at top left,#2563eb,#020617 40%),
radial-gradient(circle at bottom right,#9333ea,#020617 40%);

color:white;
}

.top{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;
}

.top a{

color:#60a5fa;

text-decoration:none;
}

.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:30px;
}

.card{

padding:30px;

border-radius:20px;

background:rgba(255,255,255,0.06);

border:1px solid rgba(255,255,255,0.1);

backdrop-filter:blur(20px);

text-align:center;
}

.card h2{

font-size:40px;

margin-top:15px;
}

.chart{

padding:30px;

border-radius:20px;

background:rgba(255,255,255,0.06);

border:1px solid rgba(255,255,255,0.1);

backdrop-filter:blur(20px);
}

.bar{

height:35px;

border-radius:10px;

margin-top:15px;

padding-left:15px;

display:flex;

align-items:center;

font-weight:bold;

background:linear-gradient(
90deg,
#3b82f6,
#9333ea
);
}

</style>
</head>

<body>

<div class="top">

<h1>Analytics Dashboard 📊</h1>

<a href="dashboard.html">

← Back

</a>

</div>

<div class="cards">

<div class="card">

<h3>Total Complaints</h3>

<h2 id="total">0</h2>

</div>

<div class="card">

<h3>Pending</h3>

<h2 id="pending">0</h2>

</div>

<div class="card">

<h3>In Progress</h3>

<h2 id="progress">0</h2>

</div>

<div class="card">

<h3>Resolved</h3>

<h2 id="resolved">0</h2>

</div>

</div>

<div class="chart">

<h2>Category Analytics</h2>

<div
class="bar"
id="waterBar">

Water : 0

</div>

<div
class="bar"
id="roadBar">

Roads : 0

</div>

<div
class="bar"
id="electricBar">

Electricity : 0

</div>

<div
class="bar"
id="cleanBar">

Cleanliness : 0

</div>

</div>

<script>

const API =
"https://smart-civic-backend-dplj.onrender.com";

async function loadAnalytics(){

try{

const res = await fetch(
`${API}/get-complaints`
);

const complaints =
await res.json();

document.getElementById(
"total"
).innerHTML = complaints.length;

let pending = 0;
let progress = 0;
let resolved = 0;

let water = 0;
let roads = 0;
let electricity = 0;
let clean = 0;

complaints.forEach(item => {

if(item.status === "Pending"){
pending++;
}

if(item.status === "In Progress"){
progress++;
}

if(item.status === "Resolved"){
resolved++;
}

if(item.category === "Water"){
water++;
}

if(item.category === "Roads"){
roads++;
}

if(item.category === "Electricity"){
electricity++;
}

if(item.category === "Cleanliness"){
clean++;
}

});

document.getElementById(
"pending"
).innerHTML = pending;

document.getElementById(
"progress"
).innerHTML = progress;

document.getElementById(
"resolved"
).innerHTML = resolved;

document.getElementById(
"waterBar"
).innerHTML =
"Water : " + water;

document.getElementById(
"roadBar"
).innerHTML =
"Roads : " + roads;

document.getElementById(
"electricBar"
).innerHTML =
"Electricity : " + electricity;

document.getElementById(
"cleanBar"
).innerHTML =
"Cleanliness : " + clean;

}

catch(error){

console.log(error);

alert("Failed to load analytics");

}

}

loadAnalytics();

</script>

</body>
</html>
