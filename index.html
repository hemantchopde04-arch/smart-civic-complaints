<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Smart Civic Complaints</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  overflow:hidden;

  background:
  radial-gradient(circle at top left,#2563eb,#020617 40%),
  radial-gradient(circle at bottom right,#9333ea,#020617 40%);

  color:white;

  position:relative;
}

/* STARS */

body::before{

  content:"";

  position:absolute;

  width:100%;

  height:100%;

  background-image:
  radial-gradient(white 1px,transparent 1px);

  background-size:80px 80px;

  opacity:0.15;

  animation:stars 20s linear infinite;
}

@keyframes stars{

  from{
    transform:translateY(0);
  }

  to{
    transform:translateY(100px);
  }
}

/* GLOW */

.glow1,
.glow2{

  position:absolute;

  width:400px;

  height:400px;

  border-radius:50%;

  filter:blur(130px);

  opacity:0.5;
}

.glow1{

  background:#2563eb;

  top:-150px;

  left:-120px;
}

.glow2{

  background:#9333ea;

  bottom:-150px;

  right:-120px;
}

/* CARD */

.card{

  width:430px;

  padding:45px 35px;

  border-radius:35px;

  background:rgba(255,255,255,0.06);

  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.1);

  box-shadow:0 0 50px rgba(0,0,0,0.5);

  text-align:center;

  z-index:10;

  animation:fadeIn 1s ease;
}

/* LOGO */

.logo{

  width:110px;

  height:110px;

  margin:auto;

  border-radius:30px;

  background:linear-gradient(135deg,#3b82f6,#9333ea);

  display:flex;

  justify-content:center;

  align-items:center;

  font-size:50px;

  font-weight:bold;

  box-shadow:0 0 35px rgba(147,51,234,0.7);

  animation:pulse 2s infinite;
}

@keyframes pulse{

  0%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.08);
  }

  100%{
    transform:scale(1);
  }
}

/* TITLE */

h1{

  margin-top:30px;

  font-size:52px;

  font-weight:700;

  line-height:1.2;
}

.gradient{

  background:linear-gradient(
    90deg,
    #60a5fa,
    #c084fc
  );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;
}

p{

  margin-top:20px;

  color:#cbd5e1;

  font-size:18px;

  line-height:1.8;
}

/* LOADER */

.loader{

  width:180px;

  height:5px;

  margin:30px auto;

  border-radius:20px;

  background:rgba(255,255,255,0.1);

  overflow:hidden;
}

.loader::before{

  content:"";

  display:block;

  width:60px;

  height:100%;

  background:linear-gradient(
    90deg,
    #3b82f6,
    #9333ea
  );

  border-radius:20px;

  animation:loading 1.5s infinite;
}

@keyframes loading{

  0%{
    transform:translateX(-60px);
  }

  100%{
    transform:translateX(180px);
  }
}

/* BUTTON */

button{

  width:100%;

  padding:18px;

  margin-top:10px;

  border:none;

  border-radius:18px;

  background:linear-gradient(
    90deg,
    #3b82f6,
    #9333ea
  );

  color:white;

  font-size:20px;

  font-weight:600;

  cursor:pointer;

  transition:0.3s;
}

button:hover{

  transform:translateY(-3px);

  box-shadow:0 0 30px rgba(147,51,234,0.6);
}

/* ANIMATION */

@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(30px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* MOBILE */

@media(max-width:500px){

  .card{

    width:90%;

    padding:35px 25px;
  }

  h1{

    font-size:38px;
  }

}

</style>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>

<div class="card">

<div class="logo">

S

</div>

<h1>

Welcome To

<br>

<span class="gradient">

Smart Civic

</span>

Complaints

</h1>

<p>

AI Powered Citizen Complaint
Management System

</p>

<div class="loader"></div>

<button onclick="startApp()">

Get Started →

</button>

</div>

<script>

function startApp(){

  window.location.href =
  "index.html";

}

</script>

</body>
</html>
