<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Civic Complaints</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

.card{
width:400px;
padding:35px;
border-radius:30px;
background:#111827;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.logo{
width:90px;
height:90px;
margin:auto;
border-radius:25px;
background:linear-gradient(135deg,#3b82f6,#9333ea);
display:flex;
justify-content:center;
align-items:center;
font-size:45px;
font-weight:bold;
margin-bottom:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#cbd5e1;
margin-bottom:25px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tabs button{
flex:1;
padding:15px;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
background:#1e293b;
color:white;
}

.tabs .active{
background:linear-gradient(90deg,#3b82f6,#9333ea);
}

input{
width:100%;
padding:18px;
margin-bottom:15px;
border:none;
border-radius:15px;
background:#1e293b;
color:white;
font-size:16px;
}

.main-btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#3b82f6,#9333ea);
color:white;
}

.main-btn:hover{
opacity:0.9;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">S</div>

<h1>Welcome 👋</h1>

<p>AI Based Civic Complaint System</p>

<div class="tabs">
<button class="active">User Login</button>
<button>Department Login</button>
</div>

<input type="text" id="phone" placeholder="Phone Number">

<input type="password" id="password" placeholder="Password">

<button class="main-btn" onclick="sendOTP()">
Send OTP
</button>

</div>

<script>

function sendOTP(){

const phone =
document.getElementById("phone").value;

const password =
document.getElementById("password").value;

if(phone === "" || password === ""){
alert("Please fill all fields");
return;
}

alert("OTP Sent Successfully");

window.location.href = "otp.html";

}

</script>

</body>
</html>
