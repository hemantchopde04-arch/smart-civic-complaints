<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Smart Civic Complaints</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

.card{
width:420px;
padding:35px;
border-radius:30px;
background:#111827;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.logo{
width:90px;
height:90px;
margin:auto;
border-radius:25px;
background:linear-gradient(135deg,#3b82f6,#9333ea);
display:flex;
justify-content:center;
align-items:center;
font-size:45px;
font-weight:bold;
margin-bottom:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#cbd5e1;
margin-bottom:25px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tabs button{
flex:1;
padding:15px;
border:none;
border-radius:15px;
font-size:18px;
cursor:pointer;
background:#1e293b;
color:white;
}

.tabs .active{
background:linear-gradient(90deg,#3b82f6,#9333ea);
}

input,
select{
width:100%;
padding:18px;
margin-bottom:15px;
border:none;
border-radius:15px;
background:#1e293b;
color:white;
font-size:16px;
}

.main-btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#3b82f6,#9333ea);
color:white;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">S</div>

<h1>Smart Civic</h1>

<p>AI Based Civic Complaint System</p>

<div class="tabs">

<button id="userBtn"
class="active"
onclick="showUser()">

User Login

</button>

<button id="deptBtn"
onclick="showDept()">

Department Login

</button>

</div>

<!-- USER LOGIN -->

<div id="userForm">

<input type="text"
id="phone"
placeholder="Phone Number">

<input type="password"
id="password"
placeholder="Password">

<button class="main-btn"
onclick="sendOTP()">

Send OTP

</button>

</div>

<!-- DEPARTMENT LOGIN -->

<div id="deptForm"
style="display:none;">

<select id="department">

<option value="Water">
Water Department
</option>

<option value="Electricity">
Electricity Department
</option>

<option value="Roads">
Roads Department
</option>

<option value="Cleanliness">
Cleanliness Department
</option>

</select>

<input type="text"
id="deptId"
placeholder="Department ID">

<input type="text"
id="deptPhone"
placeholder="Department Phone">

<input type="password"
id="deptPassword"
placeholder="Password">

<button class="main-btn"
onclick="departmentLogin()">

Department Login

</button>

</div>

</div>

<script>

function showUser(){

document.getElementById(
"userForm"
).style.display="block";

document.getElementById(
"deptForm"
).style.display="none";

document.getElementById(
"userBtn"
).classList.add("active");

document.getElementById(
"deptBtn"
).classList.remove("active");

}

function showDept(){

document.getElementById(
"userForm"
).style.display="none";

document.getElementById(
"deptForm"
).style.display="block";

document.getElementById(
"deptBtn"
).classList.add("active");

document.getElementById(
"userBtn"
).classList.remove("active");

}

function sendOTP(){

const phone =
document.getElementById(
"phone"
).value;

const password =
document.getElementById(
"password"
).value;

if(phone=="" || password==""){

alert("Fill all fields");

return;

}

window.location.href =
"otp.html?phone="+phone;

}

function departmentLogin(){

const department =
document.getElementById(
"department"
).value;

const id =
document.getElementById(
"deptId"
).value;

const phone =
document.getElementById(
"deptPhone"
).value;

const password =
document.getElementById(
"deptPassword"
).value;

// WATER

if(
department=="Water"
&&
id=="WATER123"
&&
phone=="9876543210"
&&
password=="water@123"
){

window.location.href =
"admin.html";

}

// ELECTRICITY

else if(
department=="Electricity"
&&
id=="ELEC123"
&&
phone=="9876500000"
&&
password=="electric@123"
){

window.location.href =
"admin.html";

}

// ROADS

else if(
department=="Roads"
&&
id=="ROAD123"
&&
phone=="9999999999"
&&
password=="road@123"
){

window.location.href =
"admin.html";

}

// CLEANLINESS

else if(
department=="Cleanliness"
&&
id=="CLEAN123"
&&
phone=="8888888888"
&&
password=="clean@123"
){

window.location.href =
"admin.html";

}

else{

alert(
"Wrong Department Credentials"
);

}

}

</script>

</body>
</html>
