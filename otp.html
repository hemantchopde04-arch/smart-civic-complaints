<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>OTP Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:
radial-gradient(circle at top left,#2563eb,#020617 40%),
radial-gradient(circle at bottom right,#9333ea,#020617 40%);
color:white;
}

.card{
width:420px;
padding:40px 35px;
border-radius:30px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 40px rgba(0,0,0,0.4);
}

.logo{
display:flex;
align-items:center;
gap:12px;
margin-bottom:25px;
}

.logo-box{
width:50px;
height:50px;
border-radius:15px;
background:linear-gradient(135deg,#3b82f6,#9333ea);
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
font-weight:bold;
}

h1{
margin-bottom:10px;
font-size:40px;
}

.sub{
color:#cbd5e1;
margin-bottom:25px;
font-size:15px;
}

input{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:rgba(255,255,255,0.08);
color:white;
outline:none;
font-size:18px;
margin-bottom:20px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:linear-gradient(
90deg,
#3b82f6,
#9333ea
);
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 25px rgba(147,51,234,0.5);
}

</style>
</head>

<body>

<div class="card">

<div class="logo">

<div class="logo-box">
S
</div>

<h2>
Smart Civic Complaints
</h2>

</div>

<h1>
OTP Verification
</h1>

<p class="sub" id="phoneText">
OTP Sent
</p>

<input
type="text"
id="otp"
placeholder="Enter OTP">

<button onclick="verifyOTP()">
Verify OTP
</button>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const phone = params.get("phone");

document.getElementById(
"phoneText"
).innerHTML =
"OTP sent to " + phone;

function verifyOTP(){

const otp =
document.getElementById("otp").value;

if(otp=="1234"){

alert("OTP Verified Successfully ✅");

window.location.href =
"dashboard.html";

}

else{

alert("Invalid OTP ❌");

}

}

</script>

</body>
</html>
