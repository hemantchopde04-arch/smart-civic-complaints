<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  min-height:100vh;

  padding:30px;

  background:
  radial-gradient(circle at top left,#2563eb,#020617 40%),
  radial-gradient(circle at bottom right,#9333ea,#020617 40%);

  color:white;
}

h1{
  margin-bottom:25px;
}

/* SEARCH */

.top-bar{

  display:flex;

  gap:20px;

  margin-bottom:20px;

  flex-wrap:wrap;
}

.top-bar input{

  width:300px;

  padding:14px;

  border:none;

  border-radius:14px;

  background:rgba(255,255,255,0.08);

  color:white;

  outline:none;
}

/* TABLE */

.table-box{

  overflow:auto;

  background:rgba(255,255,255,0.06);

  border-radius:20px;

  backdrop-filter:blur(20px);

  padding:20px;

  border:1px solid rgba(255,255,255,0.1);
}

table{

  width:100%;

  border-collapse:collapse;
}

th,td{

  padding:15px;

  text-align:left;
}

th{

  background:rgba(255,255,255,0.08);
}

tr{

  border-bottom:1px solid rgba(255,255,255,0.1);
}

img{

  width:90px;

  height:70px;

  object-fit:cover;

  border-radius:10px;
}

select{

  padding:8px;

  border:none;

  border-radius:10px;

  background:#1e293b;

  color:white;
}

button{

  padding:8px 14px;

  border:none;

  border-radius:10px;

  background:linear-gradient(90deg,#3b82f6,#9333ea);

  color:white;

  cursor:pointer;
}

.feedback{

  max-width:220px;

  color:#cbd5e1;

  font-size:14px;
}

</style>
</head>

<body>

<h1>Admin Complaint Panel 📋</h1>

<!-- SEARCH -->

<div class="top-bar">

<input
type="text"
id="search"
placeholder="Search Complaint..."
onkeyup="loadComplaints()">

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Title</th>
<th>Area</th>
<th>Category</th>
<th>Image</th>
<th>Status</th>
<th>Feedback</th>
<th>Action</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script>

async function loadComplaints(){

  const res = await fetch(
    "http://127.0.0.1:5000/get-complaints"
  );

  const data = await res.json();

  const search =
  document.getElementById("search")
  .value.toLowerCase();

  let rows = "";

  data.reverse().forEach(item => {

    const match =

      item.title.toLowerCase()
      .includes(search)

      ||

      item.name.toLowerCase()
      .includes(search);

    if(match){

      rows += `

      <tr>

        <td>${item.id}</td>

        <td>${item.name}</td>

        <td>${item.title}</td>

        <td>${item.area}</td>

        <td>${item.category}</td>

        <td>

          <img src="
          http://127.0.0.1:5000/uploads/${item.image}
          ">

        </td>

        <td>

          <select id="status-${item.id}">

            <option value="Pending"
            ${item.status=="Pending"
            ?"selected":""}>
            Pending
            </option>

            <option value="In Progress"
            ${item.status=="In Progress"
            ?"selected":""}>
            In Progress
            </option>

            <option value="Resolved"
            ${item.status=="Resolved"
            ?"selected":""}>
            Resolved
            </option>

          </select>

        </td>

        <!-- FEEDBACK -->

        <td class="feedback">

          ${
            item.feedback
            ? item.feedback
            : "No Feedback"
          }

        </td>

        <td>

          <button onclick="updateStatus(${item.id})">

            Update

          </button>

        </td>

      </tr>

      `;

    }

  });

  document.getElementById("tableBody")
  .innerHTML = rows;

}

loadComplaints();

// UPDATE STATUS

async function updateStatus(id){

  const status =
  document.getElementById(
    `status-${id}`
  ).value;

  await fetch(

    `http://127.0.0.1:5000/update-status/${id}`,

    {

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        status:status

      })

    }

  );

  alert("Status Updated");

  loadComplaints();

}

</script>

</body>
