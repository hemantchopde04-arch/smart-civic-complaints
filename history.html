<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Complaint History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  min-height:100vh;

  padding:30px;

  background:
  radial-gradient(circle at top left,#2563eb,#020617 40%),
  radial-gradient(circle at bottom right,#9333ea,#020617 40%);

  color:white;
}

.top{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:30px;
}

.top a{

  color:#60a5fa;

  text-decoration:none;
}

.grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(320px,1fr));

  gap:20px;
}

.card{

  background:rgba(255,255,255,0.06);

  border-radius:20px;

  padding:20px;

  border:1px solid rgba(255,255,255,0.1);

  backdrop-filter:blur(20px);
}

.card img{

  width:100%;

  height:220px;

  object-fit:cover;

  border-radius:15px;

  margin-top:15px;
}

.status{

  display:inline-block;

  margin-top:15px;

  padding:8px 14px;

  border-radius:10px;

  background:#3b82f6;
}

.feedback-btn{

  display:block;

  margin-top:15px;

  text-align:center;

  padding:12px;

  border-radius:12px;

  background:linear-gradient(90deg,#3b82f6,#9333ea);

  color:white;

  text-decoration:none;
}

.feedback-text{

  margin-top:15px;

  color:#cbd5e1;

  font-size:14px;
}

</style>
</head>

<body>

<div class="top">

<h1>Complaint History 📂</h1>

<a href="dashboard.html">

← Back

</a>

</div>

<div class="grid"
id="historyBox">

Loading...

</div>

<script>

async function loadHistory(){

  try{

    const res = await fetch(
      "http://127.0.0.1:5000/get-complaints"
    );

    const data = await res.json();

    let html = "";

    data.reverse().forEach(item => {

      html += `

      <div class="card">

        <h2>${item.title}</h2>

        <p><b>Name:</b> ${item.name}</p>

        <p><b>Area:</b> ${item.area}</p>

        <p><b>Category:</b> ${item.category}</p>

        <p><b>AI:</b> ${item.ai_category}</p>

        <p>${item.description}</p>

        <div class="status">

          ${item.status}

        </div>

        <img src="
        http://127.0.0.1:5000/uploads/${item.image}
        ">

        <a href="
        feedback.html?id=${item.id}
        "
        class="feedback-btn">

        Give Feedback ⭐

        </a>

        <div class="feedback-text">

        <b>Feedback:</b>

        ${
          item.feedback
          ? item.feedback
          : "No Feedback Yet"
        }

        </div>

      </div>

      `;

    });

    document.getElementById(
      "historyBox"
    ).innerHTML = html;

  }

  catch(error){

    document.getElementById(
      "historyBox"
    ).innerHTML =
    "Failed to load complaints";

    console.log(error);

  }

}

loadHistory();

</script>

</body>
</html>
