<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Complaint History</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:15px;
}

.status{
padding:8px 15px;
background:#2563eb;
display:inline-block;
border-radius:10px;
margin-top:10px;
font-weight:bold;
}

img{
width:100%;
max-width:300px;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<h1>Complaint History 📂</h1>

<div id="historyBox">

Loading...

</div>

<script>

const API =
"https://smart-civic-backend-2.onrender.com";

async function loadComplaints(){

try{

const response = await fetch(
`${API}/get-complaints`
);

const complaints = await response.json();

let html = "";

complaints.reverse().forEach(item => {

html += `

<div class="card">

<h2>${item.title}</h2>

<p><b>Name:</b> ${item.name}</p>

<p><b>Area:</b> ${item.area}</p>

<p><b>Category:</b> ${item.category}</p>

<p><b>Description:</b> ${item.description}</p>

<div class="status">

Status : ${item.status}

</div>

<br><br>

${
item.image
?
`<img src="${API}/uploads/${item.image}">`
:
""
}

</div>

`;

});

document.getElementById(
"historyBox"
).innerHTML = html;

}

catch(error){

console.log(error);

document.getElementById(
"historyBox"
).innerHTML =
"Server Error";

}

}

loadComplaints();

setInterval(loadComplaints,3000);

</script>

</body>
</html>
