<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{

  min-height:100vh;

  padding:30px;

  background:
  radial-gradient(circle at top left,#2563eb,#020617 40%),
  radial-gradient(circle at bottom right,#9333ea,#020617 40%);

  color:white;
}

.top{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:30px;
}

.top a{

  color:#60a5fa;

  text-decoration:none;

  font-size:18px;
}

.cards{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));

  gap:20px;

  margin-bottom:30px;
}

.card{

  background:rgba(255,255,255,0.06);

  border-radius:20px;

  padding:25px;

  text-align:center;

  border:1px solid rgba(255,255,255,0.1);

  backdrop-filter:blur(20px);
}

.card h3{

  margin-bottom:10px;

  color:#cbd5e1;
}

.card h2{

  font-size:45px;
}

.chart-box{

  background:rgba(255,255,255,0.06);

  border-radius:20px;

  padding:30px;

  border:1px solid rgba(255,255,255,0.1);

  backdrop-filter:blur(20px);

  display:flex;

  justify-content:center;

  align-items:center;

  height:500px;
}

canvas{

  max-width:450px !important;

  max-height:450px !important;
}

</style>
</head>

<body>

<!-- TOP -->

<div class="top">

<h1>Analytics Dashboard 📊</h1>

<a href="dashboard.html">

← Back

</a>

</div>

<!-- STATS -->

<div class="cards">

<div class="card">

<h3>Total Complaints</h3>

<h2 id="total">0</h2>

</div>

<div class="card">

<h3>Pending</h3>

<h2 id="pending">0</h2>

</div>

<div class="card">

<h3>In Progress</h3>

<h2 id="progress">0</h2>

</div>

<div class="card">

<h3>Resolved</h3>

<h2 id="resolved">0</h2>

</div>

</div>

<!-- CHART -->

<div class="chart-box">

<canvas id="myChart"></canvas>

</div>

<script>

async function loadAnalytics(){

  const res = await fetch(
    "http://127.0.0.1:5000/get-complaints"
  );

  const data = await res.json();

  // COUNTS

  const total = data.length;

  const pending =
  data.filter(
    item => item.status=="Pending"
  ).length;

  const progress =
  data.filter(
    item => item.status=="In Progress"
  ).length;

  const resolved =
  data.filter(
    item => item.status=="Resolved"
  ).length;

  // UPDATE UI

  document.getElementById("total")
  .innerHTML = total;

  document.getElementById("pending")
  .innerHTML = pending;

  document.getElementById("progress")
  .innerHTML = progress;

  document.getElementById("resolved")
  .innerHTML = resolved;

  // CHART

  const ctx =
  document.getElementById("myChart");

  new Chart(ctx, {

    type:"doughnut",

    data:{

      labels:[
        "Pending",
        "In Progress",
        "Resolved"
      ],

      datasets:[{

        data:[
          pending,
          progress,
          resolved
        ],

        backgroundColor:[

          "#facc15",
          "#38bdf8",
          "#22c55e"

        ],

        borderWidth:2

      }]

    },

    options:{

      responsive:true,

      plugins:{

        legend:{

          labels:{

            color:"white",

            font:{
              size:16
            }

          }

        }

      }

    }

  });

}

loadAnalytics();

</script>

</body>
</html>
